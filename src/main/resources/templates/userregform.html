<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org/">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>
<form th:action="@{/api/userreg}" th:object="${user}" method="post">
    <h1>회원가입</h1>

    <label>아이디</label><input type="text" th:field="*{username}"><br>
    <label>비밀번호</label><input type="password" th:field="*{password}"><br>
    <label>이름</label><input type="text" th:field="*{name}"><br>
    <label>이메일</label><input type="text" th:field="*{email}"><br>

    <button type="submit">가입하기</button>
</form>
</body>
</html>
